project:
  name: "npu-cifar10-test"
  mode: "full-auto"

research:
  topic: "Compare SGD, Adam, and AdamW optimizers on CIFAR-10 image classification using ResNet-18, measuring test accuracy and convergence speed"
  domains:
    - "machine-learning"
    - "computer-vision"
  daily_paper_count: 5
  quality_threshold: 3.0

runtime:
  timezone: "Asia/Shanghai"
  max_parallel_tasks: 1
  approval_timeout_hours: 12
  retry_limit: 3

notifications:
  channel: "console"
  target: ""
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

openclaw_bridge:
  use_cron: false
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: false

llm:
  provider: "openai-compatible"
  base_url: "https://api.example.com/v1"
  api_key_env: "RC_API_KEY"
  api_key: ""
  primary_model: "claude-sonnet-4-6"
  fallback_models:
    - "claude-opus-4-6"

security:
  hitl_required_stages: [5, 9, 20]
  allow_publish_without_approval: false
  redact_sensitive_logs: true

experiment:
  mode: "sandbox"
  time_budget_sec: 600
  max_iterations: 5
  metric_key: "primary_metric"
  metric_direction: "maximize"
  sandbox:
    python_path: "/var/lib/paascontainer/zty/miniconda3/envs/wan22/bin/python3"
    gpu_required: false
    max_memory_mb: 8192
  docker:
    image: "researchclaw/experiment-ascend:latest"
    gpu_enabled: true
    accelerator_type: "npu"
    memory_limit_mb: 16384
    network_policy: "setup_only"
    auto_install_deps: true
    shm_size_mb: 4096
    keep_containers: false
  opencode:
    enabled: false
  figure_agent:
    enabled: true
    min_figures: 3
    max_figures: 6
    max_iterations: 3
    render_timeout_sec: 30
    output_format: "python"
    nano_banana_enabled: false
    strict_mode: false
    dpi: 300

prompts:
  custom_file: ""

metaclaw_bridge:
  enabled: false
