  shared_results_dir: "/home/user/PyramidResearchTeam/backend/shared_results"
  paper_length: "short"   # short (2-3 pages) | medium (5-6 pages) | full (8+ pages NeurIPS style)
  sandbox:
    python_path: "/home/user/miniforge3/bin/python3"
    gpu_required: true
    gpus_per_project: 2
    max_memory_mb: 16384
    allowed_imports:
