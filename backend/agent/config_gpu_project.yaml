project:
  name: "gpu-research"
  mode: "full-auto"

research:
  topic: "placeholder"
  domains:
    - "deep-learning"
  daily_paper_count: 5
  quality_threshold: 3.0

runtime:
  timezone: "Asia/Shanghai"
  max_parallel_tasks: 2
  approval_timeout_hours: 1
  retry_limit: 3

notifications:
  channel: "console"
  target: ""
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

openclaw_bridge:
  use_cron: false
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: false

llm:
  provider: "openai-compatible"
  base_url: "https://api.vectorengine.ai/v1"
  api_key: "sk-QLo52KgqSRHiI3H3JydKzJJJw4W0URzsNnGy8d3QB1yYtFqM"
  api_key_env: "RESEARCHCLAW_API_KEY"
  primary_model: "gpt-4o"
  coding_model: "claude-opus-4-6"
  fallback_models:
    - "gpt-4.1"

security:
  hitl_required_stages: []
  allow_publish_without_approval: true
  redact_sensitive_logs: false

