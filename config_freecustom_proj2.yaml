project:
  name: "freecustom-conflict-aware"
  mode: "full-auto"

research:
  topic: "Conflict-aware mask refinement in FreeCustom: detecting and resolving spatial conflicts between multiple concept references during multi-reference self-attention to reduce concept leakage in generated images"
  domains:
    - "deep-learning"
    - "diffusion-models"
    - "image-generation"
  daily_paper_count: 3
  quality_threshold: 3.0

runtime:
  timezone: "Asia/Shanghai"
  max_parallel_tasks: 1
  approval_timeout_hours: 1
  retry_limit: 2

notifications:
  channel: "console"
  target: ""
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

openclaw_bridge:
  use_cron: false
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: false

llm:
  provider: "openai-compatible"
  base_url: "https://api.vectorengine.ai/v1"
  api_key: "sk-QLo52KgqSRHiI3H3JydKzJJJw4W0URzsNnGy8d3QB1yYtFqM"
  api_key_env: "RESEARCHCLAW_API_KEY"
  primary_model: "gpt-5.4"
  coding_model: "claude-opus-4-6"
  fallback_models:
    - "gpt-4o"
    - "gpt-4.1"

security:
  hitl_required_stages: []
  allow_publish_without_approval: true
  redact_sensitive_logs: false

experiment:
  mode: "sandbox"
  time_budget_sec: 1800
  max_iterations: 1
  metric_key: "primary_metric"
  metric_direction: "minimize"
  datasets_dir: "/home/user/Claw-AI-Lab-share/datasets"
  checkpoints_dir: "/home/user/Claw-AI-Lab-share/checkpoints"
  codebases_dir: "/home/user/Claw-AI-Lab-share/codebases"
  shared_results_dir: "/home/user/PyramidResearchTeam/backend/shared_results"
  paper_length: "short"
  sandbox:
    python_path: "/home/user/miniforge3/bin/python3"
    gpu_required: true
    gpus_per_project: 1
    max_memory_mb: 16384
    allowed_imports:
      - "numpy"
      - "scipy"
      - "matplotlib"
      - "torch"
      - "torchvision"
      - "transformers"
      - "diffusers"
      - "PIL"
      - "skimage"
      - "cv2"
      - "json"
      - "time"
      - "os"
      - "sys"
      - "math"
      - "random"
      - "collections"
      - "itertools"
      - "functools"
      - "typing"
      - "dataclasses"
      - "pathlib"
      - "csv"
      - "tqdm"
      - "pandas"
      - "sklearn"
      - "accelerate"
      - "safetensors"
      - "huggingface_hub"
      - "einops"
  sanity_check_max_iterations: 9
  code_agent:
    enabled: false
  opencode:
    enabled: true
    auto: true
    complexity_threshold: 0.0
    model: "claude-opus-4-6"
    timeout_sec: 1200
    max_retries: 2
    workspace_cleanup: false

prompts:
  custom_file: ""
