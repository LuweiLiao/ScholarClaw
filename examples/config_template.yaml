project:
  name: "__PROJECT_ID__"
  mode: "full-auto"

research:
  topic: "__TOPIC__"
  domains:
    - "deep-learning"
  daily_paper_count: 5
  quality_threshold: 3.0
  reference_papers:
    - ""   # 填 arXiv ID，如 "2301.12345"，或论文完整标题

runtime:
  timezone: "Asia/Shanghai"
  max_parallel_tasks: 1
  approval_timeout_hours: 12

notifications:
  channel: "console"
  on_stage_start: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

openclaw_bridge:
  use_message: false
  use_memory: false
  use_web_fetch: false

llm:
  provider: "openai-compatible"
  base_url: "https://api.minimaxi.com/v1"
  api_key: "sk-cp-NCCo8SCs9ynqekJW7zpJyCS-Q1EW3f9lRREY_Gn8oRTJV1PweeCRCXi7gVih_DIpXF_qeULKWLU5aXxW1tGFpXRNACZYn7jQ3HAAcAAciGywH1Ikz6kyww8"
  api_key_env: "RESEARCHCLAW_API_KEY"
  primary_model: "MiniMax-M2.7"
  coding_model: "MiniMax-M2.7"
  image_model: "MiniMax-M2.7"
  fallback_models: []

security:
  hitl_required_stages: []

experiment:
  mode: "sandbox"
  time_budget_sec: 2400
  max_iterations: 3
  metric_key: "primary_metric"
  metric_direction: "minimize"
  datasets_dir: ""
  checkpoints_dir: ""
  codebases_dir: "C:/你的论文所在目录"   # 把这里改成你的 .tex 文件夹路径
  shared_results_dir: "runs/shared_results"
  paper_length: "long"
  sandbox:
    python_path: "D:/GitRepo/Claw-AI-Lab/claw-ai-env/Scripts/python.exe"
    # 如果本机安装了 MATLAB，取消下面注释，让 Agent 可以调用 matlab.engine
    # allowed_imports:
    #   - "math"
    #   - "random"
    #   - "json"
    #   - "numpy"
    #   - "scipy"
    #   - "matplotlib"
    #   - "matlab.engine"   # 需要先: pip install matlabengine
  sanity_check_max_iterations: 100

prompts:
  custom_file: "D:/GitRepo/Claw-AI-Lab/examples/my_prompts.yaml"
