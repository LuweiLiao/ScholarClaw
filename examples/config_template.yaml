project:
  name: "__PROJECT_ID__"
  mode: "full-auto"

research:
  topic: "__TOPIC__"
  domains:
    - "deep-learning"
  daily_paper_count: 5
  quality_threshold: 3.0

runtime:
  timezone: "Asia/Shanghai"
  max_parallel_tasks: 1
  approval_timeout_hours: 1
  retry_limit: 2

notifications:
  channel: "console"
  target: ""
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

openclaw_bridge:
  use_cron: false
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: false

llm:
  provider: "openai-compatible"
  api_key: "your-api-key"
  api_key_env: "RESEARCHCLAW_API_KEY"
  primary_model: "gpt-5.4"
  coding_model: "claude-opus-4-6"
  image_model: "gemini-3-pro-image-preview"
  fallback_models:
    - "gpt-4o"
  timeout_sec: 6000

security:
  hitl_required_stages: []
  allow_publish_without_approval: true
  redact_sensitive_logs: false

experiment:
  mode: "sandbox"
  time_budget_sec: 2400
  max_iterations: 3
  metric_key: "primary_metric"
  metric_direction: "minimize"
  datasets_dir: "./datasets"
  checkpoints_dir: "./checkpoints"
  codebases_dir: "./codebases"
  shared_results_dir: "./shared_results"
  paper_length: "short"
  sandbox:
    python_path: "your-python-path"
    gpu_required: true
    gpus_per_project: 1
    max_memory_mb: 16384
    allowed_imports:
      - "numpy"
      - "scipy"
      - "matplotlib"
      - "torch"
      - "torchvision"
      - "transformers"
      - "diffusers"
      - "PIL"
      - "skimage"
      - "cv2"
      - "json"
      - "time"
      - "os"
      - "sys"
      - "math"
      - "random"
      - "collections"
      - "itertools"
      - "functools"
      - "typing"
      - "dataclasses"
      - "pathlib"
      - "csv"
      - "tqdm"
      - "pandas"
      - "sklearn"
      - "accelerate"
      - "safetensors"
      - "huggingface_hub"
      - "einops"
  sanity_check_max_iterations: 6
  code_agent:
    enabled: false
  opencode:
    enabled: true
    auto: true
    complexity_threshold: 0.2
    model: "claude-sonnet-4-6"
    timeout_sec: 2400
    max_retries: 0
    workspace_cleanup: false

prompts:
  custom_file: ""
